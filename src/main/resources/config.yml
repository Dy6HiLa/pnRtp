# Настройки pnrtp
# Мир, в который будет телепортировать игрока (независимо от того, где он находится)
target-world: "world"

# Настройки режимов (радиус и кулдаун в секундах)
# near   - телепортация рядом с игроком
# default - обычная телепортация
# far    - далёкая телепортация
# Кулдаун общий: после использования любого режима устанавливается кд для ВСЕХ режимов
modes:
  near:
    radius: 100
    cooldown: 180
    min-players: 2 # Минимальное количество игроков на сервере для работы /rtp near
  default:
    radius: 1000
    cooldown: 60
  far:
    radius: 3000
    cooldown: 30

worldborder-check: true
avoid-water: true
avoid-lava: true
avoid-trees: true
safety-check-radius: 5.0
min-players-near: 2

messages:
  no-permission: "&cУ вас нет прав для использования этого режима!"
  teleporting: "&eПоиск безопасной локации..."
  teleport-success: "&aВы успешно телепортировались на координаты: X: %x% Y: %y% Z: %z%!"
  cooldown: "&cПодождите %time% сек. перед следующей телепортацией!"
  reset-success: "&aКулдаун игрока %player% сброшен!"
  reset-not-found: "&cИгрок не найден!"
  not-enough-players: "&cНедостаточно игроков на сервере для телепортации к кому-либо!"
  cooldown-reset-target: "&aВаш кулдаун был сброшен администратором!"
  player-not-found: "&cИгрок {player} не найден!"
  invalid-world: "&cВы не можете использовать RTP здесь!"
  error: "&cПроизошла ошибка при телепортации!"
  no-safe-location: "&cНе удалось найти безопасное место. Попробуйте позже."
  usage: "&cИспользование: /rtp <near|default|far>"

titles:
  enabled: true
  up: "&aУспех!"
  down: "&eВы телепортировались!"
  fadeIn: 10
  stay: 40
  fadeOut: 10

# Эффекты при телепортации
effects:
  enabled: true
  # Эффект на старте (где стоял игрок)
  start:
    particle: PORTAL
    count: 50
    sound: ENTITY_ENDERMAN_TELEPORT
    sound-volume: 1.0
    sound-pitch: 1.2
  # Эффект на финише (куда телепортировался)
  end:
    particle: END_ROD
    count: 80
    sound: ENTITY_PLAYER_LEVELUP
    sound-volume: 0.8
    sound-pitch: 1.5

# ===== Права для LuckPerms (донат-группы) =====
# Добавьте эти права в ваши группы через LuckPerms:
#
# /lp group default permission set pnrtp.default true     <- Бесплатная обычная телепортация
# /lp group vip permission set pnrtp.near true            <- VIP: телепортация рядом
# /lp group premium permission set pnrtp.far true         <- Premium: далёкая телепортация
# /lp group admin permission set pnrtp.bypass true        <- Обход кулдауна
# /lp group admin permission set pnrtp.admin true         <- Админ: reload, resetcd
#
# Пример для нескольких прав сразу:
# /lp group premium permission set pnrtp.near true
# /lp group premium permission set pnrtp.default true
# /lp group premium permission set pnrtp.far true