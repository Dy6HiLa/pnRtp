# Настройки pnRtp
# Мир, в который будет телепортировать игрока (независимо от того, где он находится)
target-world: "world"

# Префикс для всех сообщений плагина
# Поддерживает: &c (legacy), &#FF5555 (hex shortcut), <#FF5555> (MiniMessage-like)
prefix: "&8[&#FFD700p&#FFC800n&#FFB900R&#FFAA00t&#FF9B00p&8] "

# Настройки режимов (радиус и кулдаун в секундах)
# near   - телепортация рядом с игроком
# default - обычная телепортация
# far    - далёкая телепортация
# Кулдаун общий: после использования любого режима устанавливается кд для ВСЕХ режимов
modes:
  near:
    radius: 100
    cooldown: 180
    min-players: 2 # Минимальное количество игроков на сервере для работы /rtp near
  default:
    radius: 1000
    cooldown: 60
  far:
    radius: 3000
    cooldown: 30

worldborder-check: true
avoid-water: true
avoid-lava: true
avoid-trees: true
safety-check-radius: 5.0

# ===== Форматы цветов =====
# Поддерживаемые форматы:
# &c, &a, &l и т.д.        - стандартные Legacy коды
# &#FF5555                  - hex shortcut (6 символов)
# &x&F&F&5&5&5&5            - legacy BungeeCord hex
# <#FF5555>                 - MiniMessage-like hex

messages:
  no-permission: "&#FF6B6BУ вас нет прав для использования этого режима!"
  teleporting: "&#FFD700Поиск безопасной локации..."
  teleport-success: "&#55FF55Вы успешно телепортировались на координаты: &fX: &#AAFFAA%x% &fY: &#AAFFAA%y% &fZ: &#AAFFAA%z%&f!"
  cooldown: "&#FF6B6BПодождите &#FFAA00%time% &fсек. перед следующей телепортацией!"
  reset-success: "&#55FF55Кулдаун игрока &#FFAA00%player% &#55FF55сброшен!"
  reset-not-found: "&#FF6B6BИгрок не найден!"
  not-enough-players: "&#FF6B6BНедостаточно игроков на сервере для телепортации к кому-либо!"
  cooldown-reset-target: "&#55FF55Ваш кулдаун был сброшен администратором!"
  player-not-found: "&#FF6B6BИгрок &#FFAA00%player% &#FF6B6Bне найден!"
  invalid-world: "&#FF6B6BВы не можете использовать RTP здесь!"
  error: "&#FF6B6BПроизошла ошибка при телепортации!"
  no-safe-location: "&#FF6B6BНе удалось найти безопасное место. Попробуйте позже."
  usage: "&#FF6B6BИспользование: &f/rtp &#FFAA00<near|default|far>"

titles:
  enabled: true
  up: "&#55FF55Успех!"
  down: "&#FFD700Вы телепортировались!"
  fadeIn: 10
  stay: 40
  fadeOut: 10

# Эффекты при телепортации
effects:
  enabled: true
  # Эффект на старте (где стоял игрок)
  start:
    particle: PORTAL
    count: 50
    sound: ENTITY_ENDERMAN_TELEPORT
    sound-volume: 1.0
    sound-pitch: 1.2
  # Эффект на финише (куда телепортировался)
  end:
    particle: END_ROD
    count: 80
    sound: ENTITY_PLAYER_LEVELUP
    sound-volume: 0.8
    sound-pitch: 1.5

# ===== Права для LuckPerms (донат-группы) =====
# Добавьте эти права в ваши группы через LuckPerms:
#
# /lp group default permission set pnrtp.default true     <- Бесплатная обычная телепортация
# /lp group vip permission set pnrtp.near true            <- VIP: телепортация рядом
# /lp group premium permission set pnrtp.far true         <- Premium: далёкая телепортация
# /lp group admin permission set pnrtp.bypass true        <- Обход кулдауна
# /lp group admin permission set pnrtp.admin true         <- Админ: reload, resetcd
#
# Пример для нескольких прав сразу:
# /lp group premium permission set pnrtp.near true
# /lp group premium permission set pnrtp.default true
# /lp group premium permission set pnrtp.far true