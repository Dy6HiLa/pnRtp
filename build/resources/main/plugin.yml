name: pnrtp
version: '1.0.0'
main: ru.privatenull.pnrtpPlugin
api-version: '1.21'
author: privatenull
commands:
  rtp:
    description: Случайная телепортация
    usage: /rtp
permissions:
  pnrtp.near:
    default: true
  pnrtp.far:
    default: true
  pnrtp.long:
    default: true
  pnrtp.bypass:
    default: op
  pnrtp.admin:
    default: op